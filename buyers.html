<!DOCTYPE html>
<!-- Version 1.8 | buyers.html -->
<!-- Theme: Warm Precision v1.0 | accent=#c47a2b surface=#fdf8f2 border=#f0e8da -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buyers — Sample Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --surface: #fdf8f2; 
      --border: #f0e8da; --accent: #c47a2b; --text: #1a1a1a;
      --muted: #8a7060; --error: #c0392b; --success: #2e7d52; --warn: #b45309;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'Inter', sans-serif;
      --radius: 4px; --transition: 160ms ease; --nav-h: 52px;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

    /* ── Nav ── */
    .nav { position: sticky; top: 0; z-index: 100; height: var(--nav-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; }
    .nav-brand { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; transition: color var(--transition); }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .nav-user { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); cursor: pointer; }
    .nav-user:hover { color: var(--error); }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 600; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--accent); color: #fff; border: none; font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.55rem 1rem; cursor: pointer; border-radius: var(--radius); transition: opacity var(--transition); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text); opacity: 1; }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.7rem; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.82rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .st-empty { color: var(--muted); font-style: italic; text-align: center; padding: 2rem !important; }

    /* ── Modal ── */
    .st-modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; padding: 1rem; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 2rem; }
    .modal-title { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 600; margin-bottom: 1.5rem; }
    .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

    /* ── Form ── */
    .field { margin-bottom: 1.1rem; }
    label { display: block; font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.45rem; }
    input[type="text"], input[type="email"], textarea, select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-mono); font-size: 0.85rem;
      padding: 0.65rem 0.875rem; outline: none; border-radius: var(--radius);
      transition: border-color var(--transition);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 70px; font-size: 0.82rem; line-height: 1.5; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* ── Spinner ── */
    .st-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .st-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 0.78rem; padding: 0.75rem 1.25rem; z-index: 9999; animation: fadeIn 0.2s ease; }
    .st-toast--success { border-color: var(--success); color: var(--success); }
    .st-toast--error   { border-color: var(--error);   color: var(--error);   }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ── Warm Precision Theme v1.0 ─────────────────────────────────────────── */
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); }

    /* Nav */
    .nav { background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; height: 52px; gap: 2rem; }
    .nav-brand { font-family: var(--font-mono); font-size: 0.78rem; font-weight: 500; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 0.25rem; flex: 1; }
    .nav-links a { font-size: 0.82rem; color: var(--muted); text-decoration: none; padding: 0.35rem 0.75rem; border-radius: 5px; transition: background var(--transition), color var(--transition); }
    .nav-links a:hover { background: var(--surface); color: var(--text); }
    .nav-links a.active { background: var(--surface2); color: var(--accent); font-weight: 500; }
    .nav-user { font-size: 0.78rem; color: var(--muted); cursor: pointer; padding: 0.35rem 0.75rem; border-radius: 5px; transition: color var(--transition); }
    .nav-user:hover { color: var(--accent); }

    /* Page */
    .page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
    .page-title { font-size: 1.3rem; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
    .page-sub { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }

    /* Amber divider accent */
    .page::before { content: ''; display: block; height: 2px; background: linear-gradient(90deg, var(--accent) 0%, #f0e8da 60%, transparent 100%); margin-bottom: 1.75rem; border-radius: 1px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; align-items: center; }
    .toolbar select { font-size: 0.82rem; background: #fff; border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.75rem; border-radius: var(--radius); cursor: pointer; font-family: var(--font-sans); }
    .toolbar select:focus { outline: none; border-color: var(--accent); }

    /* Table */
    .table-wrap { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    thead tr { background: var(--surface); }
    th { text-align: left; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }
    .st-empty { text-align: center; color: var(--muted); padding: 3rem; font-size: 0.83rem; }

    /* Badges */
    .badge { display: inline-block; font-size: 0.7rem; font-weight: 500; padding: 2px 8px; border-radius: 4px; font-family: var(--font-mono); }
    .badge-y { background: #edf7f0; color: #1e6640; border: 1px solid #b8e0cb; }
    .badge-n { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .sample-id { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent); background: var(--surface); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; }

    /* Buttons */
    .btn { background: var(--accent); color: #fff; border: none; font-family: var(--font-sans); font-size: 0.83rem; font-weight: 500; padding: 0.5rem 1.25rem; border-radius: var(--radius); cursor: pointer; transition: background var(--transition); letter-spacing: 0.01em; }
    .btn:hover { background: var(--accent2); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface); border-color: var(--border2); }
    .btn-sm { font-size: 0.75rem; padding: 0.3rem 0.75rem; }

    /* Inputs */
    input[type="text"], input[type="email"], input[type="date"], input[type="number"], textarea, select {
      background: #fff; border: 1px solid var(--border); color: var(--text);
      font-family: var(--font-sans); font-size: 0.85rem; padding: 0.55rem 0.875rem;
      border-radius: var(--radius); outline: none; width: 100%;
      transition: border-color var(--transition);
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,122,43,0.08); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    label { display: block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .field { margin-bottom: 1rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* Modal */
    .st-modal { display: none; position: fixed; inset: 0; background: rgba(26,16,8,0.35); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .st-modal.open { display: flex; }
    .modal-box { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 2rem; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 1rem; font-weight: 500; color: var(--text); margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .modal-section { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }

    /* Detail rows (samples modal) */
    .details-list { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 0.5rem; }
    .detail-row { display: grid; gap: 0.4rem; padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); align-items: center; font-size: 0.8rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-header { background: var(--surface); font-family: var(--font-mono); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .detail-row input, .detail-row select { padding: 0.3rem 0.5rem; font-size: 0.78rem; border-radius: 4px; }

    /* Outbound detail rows */
    .detail-table-header { display: grid; gap: 0.4rem; background: var(--surface); border: 1px solid var(--border); border-bottom: none; border-radius: var(--radius) var(--radius) 0 0; padding: 0.5rem 0.6rem; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .detail-rows-wrap { border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; margin-bottom: 0.6rem; }
    .detail-row-out { display: grid; gap: 0.4rem; padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); align-items: center; }
    .detail-row-out:last-child { border-bottom: none; }

    /* Toast */
    .st-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.8rem; padding: 0.75rem 1.25rem; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.08); animation: fadeIn 0.2s ease; }
    .st-toast--success { border-color: #b8e0cb; color: #1e6640; background: #edf7f0; }
    .st-toast--error   { border-color: #f5c6c6; color: #a32d2d; background: #fdf0ee; }

    /* Spinner */
    .st-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* Add/remove row buttons */
    .btn-add-row { background: transparent; border: 1px dashed var(--border); color: var(--muted); font-size: 0.75rem; padding: 0.45rem 1rem; border-radius: var(--radius); cursor: pointer; width: 100%; font-family: var(--font-sans); transition: all var(--transition); }
    .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }
    .btn-remove { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.72rem; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; transition: all var(--transition); }
    .btn-remove:hover { border-color: var(--error); color: var(--error); }

    /* Status badges */
    .status-badge { display: inline-block; font-size: 0.7rem; font-weight: 500; padding: 2px 9px; border-radius: 4px; }
    .status-requested  { background: #fef9ec; color: #854f0b; border: 1px solid #f5d89a; }
    .status-sent       { background: #eef4fd; color: #1a5ca8; border: 1px solid #b5d0f5; }
    .status-received   { background: #edf7f0; color: #1e6640; border: 1px solid #b8e0cb; }
    .status-dropped    { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

    /* Info block (supplier-submit / buyer-reserve) */
    .info-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.75rem; }
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; padding: 0.35rem 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .info-value { font-size: 0.83rem; color: var(--text); text-align: right; }
    .info-value.accent { color: var(--accent); font-family: var(--font-mono); font-weight: 500; }
    .info-value.warn { color: var(--warn); }
    .section-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }

    /* Availability bar */
    .avail-bar-wrap { margin: 1rem 0; }
    .avail-bar-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); margin-bottom: 0.35rem; }
    .avail-bar { height: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .avail-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; border-radius: 3px; }
    .avail-bar-fill.low  { background: #e9a94a; }
    .avail-bar-fill.none { background: var(--error); }

    /* Price preview */
    .price-preview { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; margin-bottom: 1.25rem; font-family: var(--font-mono); font-size: 0.82rem; min-height: 3.5rem; }
    .price-preview .total { font-size: 1.1rem; color: var(--accent); font-weight: 500; margin-top: 0.35rem; }
    .price-preview .muted { color: var(--muted); font-size: 0.72rem; }

    /* Success / Error states (buyer-reserve, supplier-submit) */
    .success-icon { font-size: 2rem; text-align: center; margin-bottom: 1rem; color: var(--success); }
    .success-title { font-family: var(--font-mono); font-size: 1rem; font-weight: 500; text-align: center; color: var(--success); margin-bottom: 0.5rem; }
    .success-sub, .success-detail { font-size: 0.83rem; color: var(--muted); text-align: center; line-height: 1.7; }
    .error-msg { font-family: var(--font-mono); font-size: 0.82rem; color: var(--error); text-align: center; padding: 1rem 0; }
    .full-icon  { font-size: 2rem; text-align: center; margin-bottom: 1rem; color: var(--error); }
    .full-title { font-family: var(--font-mono); font-size: 0.95rem; font-weight: 500; text-align: center; color: var(--error); margin-bottom: 0.5rem; }
    .full-sub   { font-size: 0.82rem; color: var(--muted); text-align: center; }

    /* Card (login, submit pages) */
    .card, .login-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; }
    .card-logo, .login-logo { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2rem; }
    .card-title, .login-title { font-size: 1.3rem; font-weight: 500; color: var(--text); margin-bottom: 0.3rem; font-family: var(--font-sans); letter-spacing: -0.01em; }
    .card-sub, .login-sub { font-size: 0.83rem; color: var(--muted); margin-bottom: 2rem; }

    /* Level badges */
    .level-large  { background: #edf7f0; color: #1e6640; border: 1px solid #b8e0cb; }
    .level-medium { background: #eef4fd; color: #1a5ca8; border: 1px solid #b5d0f5; }
    .level-small  { background: #fef9ec; color: #854f0b; border: 1px solid #f5d89a; }
    .level-micro  { background: #fdf0ee; color: #a32d2d; border: 1px solid #f5c6c6; }

    /* ── End Warm Precision ─────────────────────────────────────────────────── */
  </style>
</head>
<body>

  <nav class="nav">
    <span class="nav-brand" id="nav-brand">Sample Tracker</span>
    <div class="nav-links">
      <a href="samples.html">Inbound</a>
      <a href="all-samples.html">All Samples</a>
      <a href="suppliers.html">Suppliers</a>
      <a href="buyers.html" class="active">Buyers</a>
      <a href="outbound.html">Outbound</a>
    </div>
    <span class="nav-user" id="nav-user">Sign out</span>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-title">Buyers</div>
      <button class="btn" id="btn-new">+ New Buyer</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Company Name</th>
            <th>Country</th>
            <th>Level</th>
            <th>Warehouse</th>
            <th>Min Bags</th>
            <th>Contact Person</th>
            <th>Email</th>
            <th>Address</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="buyers-tbody">
          <tr><td colspan="7" class="st-empty"><div class="st-spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Modal: New / Edit Buyer ── -->
  <div class="st-modal" id="modal-buyer">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">New Buyer</div>

      <input type="hidden" id="b-id" />

      <div class="field">
        <label for="b-company">Company Name <span style="color:var(--error)">*</span></label>
        <input type="text" id="b-company" placeholder="Acme Coffee Co." />
      </div>

      <div class="field">
        <label for="b-address">Address <span style="color:var(--error)">*</span></label>
        <textarea id="b-address" placeholder="Street, City, Postal Code"></textarea>
      </div>

      <div class="field">
        <label for="b-country">Country <span style="color:var(--error)">*</span></label>
        <select id="b-country"></select>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="b-contact">Contact Person</label>
          <input type="text" id="b-contact" placeholder="Jane Smith" />
        </div>
        <div class="field">
          <label for="b-email">Email <span style="color:var(--error)">*</span></label>
          <input type="email" id="b-email" placeholder="buyer@company.com" />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="b-level">Buyer Level <span style="color:var(--error)">*</span></label>
          <select id="b-level">
            <option value="">— Select level —</option>
            <option value="Large">Large</option>
            <option value="Medium">Medium</option>
            <option value="Small">Small</option>
            <option value="Micro">Micro</option>
          </select>
        </div>
        <div class="field">
          <label for="b-warehouse">Home Warehouse <span style="color:var(--error)">*</span></label>
          <select id="b-warehouse"></select>
        </div>
      </div>

      <!-- v1.8: Min bags per coffee type -->
      <div class="field" style="margin-top:0.5rem">
        <label>Minimum Bags per Coffee Type</label>
        <div id="minimums-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.25rem"></div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
        <button class="btn" id="btn-save">Save Buyer</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Version 1.8 | buyers.html script

    if (!Auth.requireAuth()) throw new Error('Unauthenticated');

    let PAGE_DATA = { buyers: [], countries: [], buyer_levels: [], coffee_types: [], minimums: [] };  // v1.8: coffee_types + minimums

    // ── Init ──────────────────────────────────────────────────────────────────
    (async () => {
      const user    = Auth.getUser();
      const company = Auth.getCompany();
      document.getElementById('nav-brand').textContent = company ? company.company_name : 'Sample Tracker';
      document.getElementById('nav-user').textContent = (user ? user.name : '') + ' · Sign out';
      document.getElementById('nav-user').addEventListener('click', UI.logout);
      await loadPageData();
    })();

    async function loadPageData() {
      try {
        PAGE_DATA = await API.getBuyersPage();
        renderTable();
        populateCountrySelect();
        populateWarehouseSelect();  // v1.6 fix — was defined but never called
      } catch (err) {
        document.getElementById('buyers-tbody').innerHTML =
          '<tr><td colspan="7" class="st-empty" style="color:var(--error)">' + UI.esc(err.message) + '</td></tr>';
      }
    }

    // ── Table ─────────────────────────────────────────────────────────────────
    const LEVEL_COLORS = { Large: '#4affa0', Medium: '#7ab8ff', Small: '#ffc84a', Micro: '#ff8c8c' };
    function levelBadge(level) {
      if (!level) return '<span style="color:var(--muted)">—</span>';
      const color = LEVEL_COLORS[level] || '#888';
      return '<span style="font-family:var(--font-mono);font-size:0.7rem;padding:2px 8px;border:1px solid ' + color + ';color:' + color + '">' + UI.esc(level) + '</span>';
    }

    function renderTable() {
      const countryMap = {};
      PAGE_DATA.countries.forEach(c => countryMap[c.country_id] = c.country_name + ' (' + c.country_code + ')');
      const whMap = {};
      Auth.getWarehouses().forEach(w => whMap[w.warehouse_id] = w.warehouse_name);
      // v1.8: build minimums lookup { buyer_id: { coffeeType: minBags } }
      const minimumsLookup = {};
      (PAGE_DATA.minimums || []).forEach(m => {
        if (!minimumsLookup[m.buyer_id]) minimumsLookup[m.buyer_id] = {};
        minimumsLookup[m.buyer_id][m.coffee_type] = m.min_bags;
      });
      function minimumsCell(buyerId) {
        const mins = minimumsLookup[buyerId] || {};
        const types = PAGE_DATA.coffee_types || ['Microlot','Blend'];
        if (!types.some(t => mins[t] !== undefined)) return '<span style="color:var(--muted)">—</span>';
        return types.map(t => mins[t] !== undefined
          ? '<span style="font-family:var(--font-mono);font-size:0.7rem">' + UI.esc(t) + ': <strong>' + mins[t] + '</strong></span>'
          : '').filter(Boolean).join('<br>');
      }

      UI.buildTable(document.getElementById('buyers-tbody'), PAGE_DATA.buyers, (b) => `
        <td style="font-family:var(--font-mono);font-size:0.75rem;color:var(--muted)">#${UI.esc(b.buyer_id)}</td>
        <td><strong>${UI.esc(b.company_name)}</strong></td>
        <td>${UI.esc(countryMap[b.country_id] || '—')}</td>
        <td>${levelBadge(b.buyer_level)}</td>
        <td>${UI.esc(whMap[b.warehouse_id] || '—')}</td>
        <td>${minimumsCell(b.buyer_id)}</td>
        <td>${UI.esc(b.contact_person || '—')}</td>
        <td>${UI.esc(b.email || '—')}</td>
        <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${UI.esc(b.address || '—')}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openEdit(${b.buyer_id})">Edit</button></td>
      `);
    }

    function populateCountrySelect() {
      UI.populateSelect(document.getElementById('b-country'), PAGE_DATA.countries, 'country_id', 'country_name', '— Select country —');
    }

    function populateWarehouseSelect() {
      // v1.6: warehouses come from session — no extra API call needed
      UI.populateSelect(document.getElementById('b-warehouse'), Auth.getWarehouses(), 'warehouse_id', 'warehouse_name', '— Select warehouse —');
    }

    // ── New ───────────────────────────────────────────────────────────────────
    document.getElementById('btn-new').addEventListener('click', () => {
      document.getElementById('modal-title').textContent = 'New Buyer';
      document.getElementById('b-id').value      = '';
      document.getElementById('b-company').value = '';
      document.getElementById('b-address').value = '';
      document.getElementById('b-contact').value = '';
      document.getElementById('b-email').value   = '';
      document.getElementById('b-country').value = '';
      document.getElementById('b-level').value     = '';
      document.getElementById('b-warehouse').value = '';
      renderMinimumsGrid(null);  // v1.8
      UI.openModal('modal-buyer');
    });

    // ── Edit ──────────────────────────────────────────────────────────────────
    function openEdit(buyerId) {
      const b = PAGE_DATA.buyers.find(x => String(x.buyer_id) === String(buyerId));
      if (!b) return;
      document.getElementById('modal-title').textContent = 'Edit Buyer';
      document.getElementById('b-id').value      = b.buyer_id;
      document.getElementById('b-company').value = b.company_name;
      document.getElementById('b-address').value = b.address || '';
      document.getElementById('b-contact').value = b.contact_person || '';
      document.getElementById('b-email').value   = b.email || '';
      document.getElementById('b-country').value = b.country_id;
      document.getElementById('b-level').value     = b.buyer_level  || '';
      document.getElementById('b-warehouse').value = b.warehouse_id || '';
      renderMinimumsGrid(b.buyer_id);  // v1.8
      UI.openModal('modal-buyer');
    }

    document.getElementById('btn-cancel').addEventListener('click', () => UI.closeModal('modal-buyer'));

    // ── Save ──────────────────────────────────────────────────────────────────
    document.getElementById('btn-save').addEventListener('click', async () => {
      const companyName = document.getElementById('b-company').value.trim();
      const address     = document.getElementById('b-address').value.trim();
      const countryId   = document.getElementById('b-country').value;
      const email       = document.getElementById('b-email').value.trim();

      const buyerLevel = document.getElementById('b-level').value;
      if (!companyName) { UI.toastError('Company name is required.'); return; }
      if (!address)     { UI.toastError('Address is required.'); return; }
      if (!countryId)   { UI.toastError('Country is required.'); return; }
      if (!email)       { UI.toastError('Email is required.'); return; }
      if (!buyerLevel)  { UI.toastError('Buyer level is required.'); return; }
      const warehouseId = document.getElementById('b-warehouse').value;
      if (!warehouseId) { UI.toastError('Home warehouse is required.'); return; }

      const btn = document.getElementById('btn-save');
      UI.setLoading(btn, true);

      try {
        const result = await API.saveBuyer({
          buyer_id:       document.getElementById('b-id').value || null,
          company_name:   companyName,
          address:        address,
          country_id:     countryId,
          contact_person: document.getElementById('b-contact').value.trim(),
          email:          email,
          buyer_level:    buyerLevel,   // v1.3
          warehouse_id:   warehouseId  // v1.6
        });
        // v1.8: save minimums for this buyer
        await saveMinimumsForBuyer(result.buyer_id);
        UI.closeModal('modal-buyer');
        UI.toastSuccess('Buyer saved.');
        await loadPageData();
      } catch (err) {
        UI.toastError(err.message);
      } finally {
        UI.setLoading(btn, false);
      }
    });

    // ── Buyer Minimums (v1.8) ──────────────────────────────────────────────────
    // Renders editable min_bags inputs per coffee type in buyer modal.
    // Also saves each minimum individually when buyer is saved.

    function renderMinimumsGrid(buyerId) {
      const grid  = document.getElementById('minimums-grid');
      const types = PAGE_DATA.coffee_types || ['Microlot', 'Blend'];
      const mins  = {};
      if (buyerId) {
        (PAGE_DATA.minimums || [])
          .filter(m => String(m.buyer_id) === String(buyerId))
          .forEach(m => { mins[m.coffee_type] = m.min_bags; });
      }
      grid.innerHTML = types.map(t =>
        '<div><label style="font-size:0.65rem">' + UI.esc(t) + ' min bags</label>' +
        '<input type="number" min="0" placeholder="0" value="' + (mins[t] !== undefined ? mins[t] : '') + '" ' +
        'id="min-' + t.toLowerCase() + '" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;font-family:var(--font-mono);font-size:0.85rem" /></div>'
      ).join('');
    }

    async function saveMinimumsForBuyer(buyerId) {
      const types = PAGE_DATA.coffee_types || ['Microlot', 'Blend'];
      for (const t of types) {
        const input = document.getElementById('min-' + t.toLowerCase());
        if (!input) continue;
        const val = input.value.trim();
        if (val === '') continue;
        const bags = parseInt(val);
        if (isNaN(bags) || bags < 0) continue;
        await API.saveBuyerMinimum(buyerId, t, bags);
        // Update local PAGE_DATA minimums
        const existing = (PAGE_DATA.minimums || []).find(m => String(m.buyer_id) === String(buyerId) && m.coffee_type === t);
        if (existing) existing.min_bags = bags;
        else { PAGE_DATA.minimums = PAGE_DATA.minimums || []; PAGE_DATA.minimums.push({ buyer_id: buyerId, coffee_type: t, min_bags: bags }); }
      }
    }
  </script>

</body>
</html>
