    .success-sub, .success-detail { font-size: 0.83rem; color: var(--muted); text-align: center; line-height: 1.7; }
    .error-msg { font-family: var(--font-mono); font-size: 0.82rem; color: var(--error); text-align: center; padding: 1rem 0; }
    .full-icon  { font-size: 2rem; text-align: center; margin-bottom: 1rem; color: var(--error); }
    .full-title { font-family: var(--font-mono); font-size: 0.95rem; font-weight: 500; text-align: center; color: var(--error); margin-bottom: 0.5rem; }
    .full-sub   { font-size: 0.82rem; color: var(--muted); text-align: center; }

    /* Card (login, submit pages) */
    .card, .login-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; }
    .card-logo, .login-logo { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2rem; }
    .card-title, .login-title { font-size: 1.3rem; font-weight: 500; color: var(--text); margin-bottom: 0.3rem; font-family: var(--font-sans); letter-spacing: -0.01em; }
    .card-sub, .login-sub { font-size: 0.83rem; color: var(--muted); margin-bottom: 2rem; }

    /* Level badges */
    .level-large  { background: #edf7f0; color: #1e6640; border: 1px solid #b8e0cb; }
    .level-medium { background: #eef4fd; color: #1a5ca8; border: 1px solid #b5d0f5; }
    .level-small  { background: #fef9ec; color: #854f0b; border: 1px solid #f5d89a; }
    .level-micro  { background: #fdf0ee; color: #a32d2d; border: 1px solid #f5c6c6; }

    /* ── End Warm Precision ─────────────────────────────────────────────────── */

    /* Autocomplete dropdown (v1.11) */
    .ac-wrap { position: relative; overflow: visible; }
    .ac-input { width: 100%; }
    .ac-dropdown { position: fixed; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); z-index: 9999; max-height: 200px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .ac-item { padding: 0.5rem 0.75rem; font-size: 0.78rem; cursor: pointer; border-bottom: 1px solid var(--border); }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.ac-active { background: var(--surface2); }
    .ac-item-id { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent); font-weight: 500; }
    .ac-item-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .ac-item-avail { font-family: var(--font-mono); font-size: 0.68rem; color: var(--success); float: right; }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="nav-brand" id="nav-brand">Sample Tracker</span>
    <div class="nav-links">
      <a href="samples.html">Inbound</a>
      <a href="all-samples.html">All Samples</a>
      <a href="suppliers.html">Suppliers</a>
      <a href="buyers.html">Buyers</a>
      <a href="outbound.html" class="active">Outbound</a>
    </div>
    <span class="nav-user" id="nav-user">Sign out</span>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-title">Outbound Samples</div>
      <button class="btn" id="btn-new">+ New Outbound</button>
    </div>

    <div class="toolbar">
      <select id="filter-warehouse">
        <option value="">All Warehouses</option>
      </select>
      <select id="filter-status">
        <option value="">All Statuses</option>
        <option value="Requested">Requested</option>
        <option value="Sent">Sent</option>
        <option value="Received">Received</option>
        <option value="Dropped Off">Dropped Off</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:28px"></th>
            <th>ID</th>
            <th>Buyer</th>
            <th>Warehouse</th>
            <th>Beans</th>
            <th>Shipping Date</th>
            <th>Courier</th>
            <th>Tracking #</th>
            <th>Samples</th>
            <th>Status</th>
            <th>Update Status</th>
          </tr>
        </thead>
        <tbody id="outbound-tbody">
          <tr><td colspan="11" class="st-empty"><div class="st-spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Modal: New Outbound ── -->
  <div class="st-modal" id="modal-outbound">
    <div class="modal-box">
      <div class="modal-title">New Outbound Sample</div>

      <div class="field-row">
        <div class="field">
          <label for="o-buyer">Buyer <span style="color:var(--error)">*</span></label>
          <select id="o-buyer" style="width:100%"></select>
        </div>
        <div class="field">
          <label for="o-warehouse">Warehouse <span style="color:var(--error)">*</span></label>
          <select id="o-warehouse" style="width:100%"></select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="o-beans">Beans <span style="color:var(--error)">*</span></label>
          <select id="o-beans" style="width:100%">
            <option value="">— Select type —</option>
            <option value="Green">Green</option>
            <option value="Roasted">Roasted</option>
          </select>
        </div>
        <div class="field">
          <label for="o-shipping-date">Shipping Date</label>
          <input type="date" id="o-shipping-date" />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="o-courier">Courier</label>
          <input type="text" id="o-courier" placeholder="e.g. DHL" />
        </div>
        <div class="field">
          <label for="o-tracking">Tracking Number</label>
          <input type="text" id="o-tracking" placeholder="Optional at creation" />
        </div>
      </div>

      <!-- Sample detail rows -->
      <div class="modal-section">Sample Details <span style="color:var(--error)">*</span></div>

      <div class="detail-table-header">
        <span>Search Sample ID</span>
        <span>Origin Code</span>
        <span>Name</span>
        <span>Type</span>
        <span>Qty (g)</span>
        <span></span>
      </div>
      <div class="detail-rows-wrap" id="outbound-detail-rows"></div>
      <button class="btn-add-row" id="btn-add-detail-row" type="button">+ Add Sample Row</button>

      <!-- Notes v1.12 -->
      <div class="field" style="margin-top:1rem">
        <label for="o-notes">Notes <span style="color:var(--muted);font-size:0.7rem">(optional · max 250 chars)</span></label>
        <textarea id="o-notes" maxlength="250" rows="3" placeholder="Any notes for the warehouse or buyer…" style="resize:vertical;width:100%;background:#fff;border:1px solid var(--border);color:var(--text);font-family:var(--font-sans);font-size:0.85rem;padding:0.55rem 0.875rem;border-radius:var(--radius);outline:none"></textarea>
        <div id="o-notes-count" style="font-size:0.7rem;color:var(--muted);text-align:right;margin-top:2px">0 / 250</div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-cancel-outbound">Cancel</button>
        <button class="btn" id="btn-save-outbound">Create &amp; Notify Warehouse</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Status Update Confirm ── -->
  <div class="st-modal" id="modal-status">
    <div class="modal-box" style="max-width:480px">
      <div class="modal-title">Update Status</div>
      <div id="status-confirm-info" style="font-size:0.85rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6"></div>
      <!-- Shipping fields — shown only when transitioning to Sent -->
      <div id="shipping-fields" style="display:none">
        <div style="height:1px;background:var(--border);margin-bottom:1.25rem"></div>
        <div class="field-row" style="margin-bottom:0.75rem">
          <div class="field" style="margin-bottom:0">
            <label for="st-shipping-date">Shipping Date <span style="color:var(--error)">*</span></label>
            <input type="date" id="st-shipping-date" />
          </div>
          <div class="field" style="margin-bottom:0">
            <label for="st-courier">Courier <span style="color:var(--error)">*</span></label>
            <input type="text" id="st-courier" placeholder="e.g. DHL, FedEx" />
          </div>
        </div>
        <div class="field">
          <label for="st-tracking">Tracking Number <span style="color:var(--error)">*</span></label>
          <input type="text" id="st-tracking" placeholder="Enter tracking number" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('modal-status')">Cancel</button>
        <button class="btn" id="btn-confirm-status">Confirm</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Version 1.2 | outbound.html script

    if (!Auth.requireAuth()) throw new Error('Unauthenticated');

    // ── State ─────────────────────────────────────────────────────────────────
    let PAGE_DATA = { outbounds: [], details: [], buyers: [], warehouses: [], inboundDetails: [], samplePrices: [] };
    let outboundDetailRows = []; // v1.7: each row = { inbound_detail_id, sample_type, qty_grams }
    let pendingStatus = { outbound_id: null, status: null };

    const STATUS_CSS = { 'Requested': 'badge-requested', 'Sent': 'badge-sent', 'Received': 'badge-received', 'Dropped Off': 'badge-dropped-off' };
    const BTN_CSS    = { 'Requested': 's-requested', 'Sent': 's-sent', 'Received': 's-received', 'Dropped Off': 's-dropped-off' };
    // v1.11.3: Two valid paths — A: Requested→Sent→Received | B: Requested→Dropped Off→Received
    const TRANSITIONS = {
      'Requested':   ['Sent', 'Dropped Off'],
      'Sent':        ['Received'],
      'Dropped Off': ['Received'],
      'Received':    []
    };

    // ── Init ──────────────────────────────────────────────────────────────────
    (async () => {
      const user    = Auth.getUser();
      const company = Auth.getCompany();
      document.getElementById('nav-brand').textContent = company ? company.company_name : 'Sample Tracker';
      document.getElementById('nav-user').textContent  = (user ? user.name : '') + ' · Sign out';
      document.getElementById('nav-user').addEventListener('click', UI.logout);

      // Warehouse filter from session
      const whs = Auth.getWarehouses();
      const filterWH = document.getElementById('filter-warehouse');
      whs.forEach(wh => {
        const opt = document.createElement('option');
        opt.value = wh.warehouse_id;
        opt.textContent = wh.warehouse_name;
        filterWH.appendChild(opt);
      });

      filterWH.addEventListener('change', applyFilters);
      document.getElementById('filter-status').addEventListener('change', applyFilters);

      await loadPageData(null);
    })();

    // ── Load Page Data ────────────────────────────────────────────────────────
    async function loadPageData(warehouseId) {
      try {
        PAGE_DATA = await API.getOutboundPage(warehouseId);
        populateModalDropdowns();
        renderTable(PAGE_DATA.outbounds);
      } catch (err) {
        document.getElementById('outbound-tbody').innerHTML =
          '<tr><td colspan="11" class="st-empty" style="color:var(--error)">' + UI.esc(err.message) + '</td></tr>';
      }
    }

    function applyFilters() {
      const whId     = document.getElementById('filter-warehouse').value;
      const status   = document.getElementById('filter-status').value;
      let filtered   = PAGE_DATA.outbounds;
      if (whId)   filtered = filtered.filter(o => String(o.warehouse_id) === whId);
      if (status) filtered = filtered.filter(o => o.status === status);
      renderTable(filtered);
    }

    // ── Render Table ──────────────────────────────────────────────────────────
    // v1.12.1: expanded row state
    let expandedOutbounds = new Set();

    function renderTable(outbounds) {
      const tbody = document.getElementById('outbound-tbody');
      const buyerMap = {};
      PAGE_DATA.buyers.forEach(b => buyerMap[b.buyer_id] = b.company_name);
      const whMap = {};
      Auth.getWarehouses().forEach(w => whMap[w.warehouse_id] = w.warehouse_name);

      const detailMap = {};
      PAGE_DATA.details.forEach(d => {
        if (!detailMap[d.outbound_id]) detailMap[d.outbound_id] = [];
        detailMap[d.outbound_id].push(d);
      });

      // v1.12.3: sort descending by outbound_id (newest first)
      outbounds = outbounds.slice().sort((a, b) => Number(b.outbound_id) - Number(a.outbound_id));

      tbody.innerHTML = '';

      outbounds.forEach(o => {
        const dets      = detailMap[o.outbound_id] || [];
        const isOpen    = expandedOutbounds.has(o.outbound_id);
        const statusClass    = STATUS_CSS[o.status] || 'badge-requested';
        const nextStatuses   = TRANSITIONS[o.status] || [];
        const allBtnStatuses = [o.status, ...nextStatuses];

        const statusBtns = allBtnStatuses.map(s => {
          const isCurrent = s === o.status;
          return `<button class="btn-status ${BTN_CSS[s] || ''}" ${isCurrent ? 'disabled' : ''}
            onclick="event.stopPropagation();openStatusConfirm(${o.outbound_id},'${UI.esc(s)}','${UI.esc(buyerMap[o.buyer_id] || '')}')">
            ${isCurrent ? '\u25cf ' : ''}${UI.esc(s)}</button>`;
        }).join('');

        const tr = document.createElement('tr');
        tr.style.cursor = dets.length ? 'pointer' : 'default';
        tr.innerHTML = `
          <td style="width:28px;text-align:center;color:var(--accent);font-size:0.9rem;user-select:none">${dets.length ? (isOpen ? '\u25be' : '\u25b8') : ''}</td>
          <td style="font-family:var(--font-mono);font-size:0.75rem;color:var(--muted)">#${UI.esc(o.outbound_id)}</td>
          <td>${UI.esc(buyerMap[o.buyer_id] || '\u2014')}</td>
          <td>${UI.esc(whMap[o.warehouse_id] || '\u2014')}</td>
          <td>${beansBadge(o.beans)}</td>
          <td>${UI.formatDate(o.shipping_date) || '\u2014'}</td>
          <td>${UI.esc(o.courier || '\u2014')}</td>
          <td>${UI.esc(o.tracking_number || '\u2014')}</td>
          <td style="font-size:0.78rem;color:var(--muted)">${dets.length ? dets.length + ' sample' + (dets.length > 1 ? 's' : '') : '\u2014'}</td>
          <td><span class="badge ${statusClass}">${UI.esc(o.status)}</span></td>
          <td>
            <div class="status-btns">${statusBtns}</div>
            ${o.notes ? '<div style="font-size:0.72rem;color:var(--muted);font-style:italic;margin-top:4px">\ud83d\udcdd ' + UI.esc(o.notes) + '</div>' : ''}
          </td>`;

        if (dets.length) {
          tr.addEventListener('click', () => {
            if (expandedOutbounds.has(o.outbound_id)) expandedOutbounds.delete(o.outbound_id);
            else expandedOutbounds.add(o.outbound_id);
            renderTable(outbounds);
          });
        }
        tbody.appendChild(tr);

        // Expanded detail sub-table
        if (isOpen && dets.length) {
          const detTr = document.createElement('tr');
          detTr.style.background = 'var(--surface)';
          let h = '<td colspan="11" style="padding:0.75rem 1rem 1rem 2.5rem">';
          h += '<div style="font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem">Sample Details</div>';
          h += '<table style="width:100%;border-collapse:collapse;font-size:0.78rem">';
          h += '<thead><tr style="background:var(--surface2)">';
          ['Sample Code','Name','Origin Code','Type','Qty (g)','Price Sent'].forEach(col => {
            h += `<th style="text-align:left;padding:4px 8px;font-size:0.65rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)">${col}</th>`;
          });
          h += '</tr></thead><tbody>';
          dets.forEach(d => {
            const priceSent = d.sale_price_sent
              ? '$' + parseFloat(d.sale_price_sent).toFixed(2) + '/' + (d.sale_price_unit_sent || 'kg')
              : '\u2014';
            h += `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:5px 8px;font-family:var(--font-mono);font-size:0.72rem;color:var(--accent)">${UI.esc(d.sample_code||'\u2014')}</td>
              <td style="padding:5px 8px">${UI.esc(d.sample_name||'\u2014')}</td>
              <td style="padding:5px 8px;font-family:var(--font-mono);font-size:0.72rem">${UI.esc(d.origin_sample_code||'\u2014')}</td>
              <td style="padding:5px 8px">${UI.esc(d.sample_type||'\u2014')}</td>
              <td style="padding:5px 8px;font-family:var(--font-mono)">${d.qty_grams ? d.qty_grams+'g' : '\u2014'}</td>
              <td style="padding:5px 8px;font-family:var(--font-mono);color:var(--accent);font-weight:500">${priceSent}</td>
            </tr>`;
          });
          h += '</tbody></table></td>';
          detTr.innerHTML = h;
          tbody.appendChild(detTr);
        }
      });

      if (!outbounds.length) {
        tbody.innerHTML = '<tr><td colspan="11" class="st-empty">No outbound samples found.</td></tr>';
      }
    }

    function beansBadge(beans) {
      if (!beans) return '<span style="color:var(--muted)">—</span>';
      const cls = beans === 'Green' ? 'badge-green' : 'badge-roasted';
      return `<span class="badge ${cls}">${UI.esc(beans)}</span>`;
    }

    // ── Populate modal dropdowns ───────────────────────────────────────────────
    function populateModalDropdowns() {
      UI.populateSelect(document.getElementById('o-buyer'),     PAGE_DATA.buyers,    'buyer_id',     'company_name',   '— Select buyer —');
      UI.populateSelect(document.getElementById('o-warehouse'), Auth.getWarehouses(), 'warehouse_id', 'warehouse_name', '— Select warehouse —');
    }

    // Notes char counter (v1.12)
    document.getElementById('o-notes').addEventListener('input', function() {
      document.getElementById('o-notes-count').textContent = this.value.length + ' / 250';
    });

    // v1.6: Auto-fill warehouse when buyer selected | v1.7: re-render picker (prices change per level)
    document.getElementById('o-buyer').addEventListener('change', function() {
      const buyerId = this.value;
      if (!buyerId) return;
      const buyer = PAGE_DATA.buyers.find(b => String(b.buyer_id) === String(buyerId));
      if (buyer && buyer.warehouse_id) {
        document.getElementById('o-warehouse').value = buyer.warehouse_id;
      }
      renderOutboundDetailRows(); // v1.7: refresh prices in picker for new buyer's level
    });

    // ── New Outbound Modal ────────────────────────────────────────────────────
    document.getElementById('btn-new').addEventListener('click', () => {
      outboundDetailRows = [{ inbound_detail_id: '', sample_code: '', sample_name: '', origin_sample_code: '', sample_type: '', qty_grams: '' }];  // v1.7
      document.getElementById('o-buyer').value         = '';
      document.getElementById('o-warehouse').value     = '';
      document.getElementById('o-beans').value         = '';
      document.getElementById('o-shipping-date').value = '';
      document.getElementById('o-courier').value       = '';
      document.getElementById('o-tracking').value      = '';
      document.getElementById('o-notes').value         = '';
      document.getElementById('o-notes-count').textContent = '0 / 250';
      renderOutboundDetailRows();
      UI.openModal('modal-outbound');
    });

    document.getElementById('btn-cancel-outbound').addEventListener('click', () => UI.closeModal('modal-outbound'));

    // ── Outbound detail rows (v1.11) ─────────────────────────────────────────
    // Each row: autocomplete sample search | origin (auto-filled) | name (auto-filled) | type | qty | remove
    // Autocomplete searches inbound_details by sample_id, origin_sample_code, sample_name

    function renderOutboundDetailRows() {
      const wrap = document.getElementById('outbound-detail-rows');
      wrap.innerHTML = '';
      if (!outboundDetailRows.length) {
        wrap.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--muted);font-size:0.8rem">No sample rows yet.</div>';
        return;
      }
      outboundDetailRows.forEach((d, i) => {
        const div = document.createElement('div');
        div.className = 'detail-row-out';

        // Build display label for selected sample
        const selectedLabel = d.inbound_detail_id
          ? (d.sample_code || d.inbound_detail_id)
          : '';

        div.innerHTML =
          // Autocomplete search cell
          `<div class="ac-wrap" id="ac-wrap-${i}">
            <input type="text" class="ac-input" id="ac-input-${i}" placeholder="Search sample ID…"
              value="${UI.esc(selectedLabel)}"
              autocomplete="off"
              oninput="onAcInput(${i}, this.value)"
              onfocus="onAcInput(${i}, this.value)"
              onkeydown="onAcKey(event, ${i})" />
            <div class="ac-dropdown" id="ac-drop-${i}" style="display:none"></div>
          </div>` +
          // Origin (read-only, auto-filled)
          `<input type="text" id="ac-origin-${i}" placeholder="Origin code" value="${UI.esc(d.origin_sample_code || '')}"
            readonly style="background:var(--surface);color:var(--muted)" />` +
          // Name (read-only, auto-filled)
          `<input type="text" id="ac-name-${i}" placeholder="Name" value="${UI.esc(d.sample_name || '')}"
            readonly style="background:var(--surface);color:var(--muted)" />` +
          // Type
          `<select onchange="outboundDetailRows[${i}].sample_type=this.value">
            <option value="">— Type —</option>
            <option value="Preship"  ${d.sample_type==='Preship' ?'selected':''}>Preship</option>
            <option value="Type"     ${d.sample_type==='Type'    ?'selected':''}>Type</option>
            <option value="Spot Lot" ${d.sample_type==='Spot Lot'?'selected':''}>Spot Lot</option>
          </select>` +
          // Qty grams
          `<input type="number" placeholder="g" min="0" value="${UI.esc(d.qty_grams || '')}"
            oninput="outboundDetailRows[${i}].qty_grams=this.value" />` +
          // Remove
          `<button class="btn-remove" onclick="removeOutboundDetailRow(${i})">✕</button>`;

        wrap.appendChild(div);
      });

      // Close all dropdowns when clicking outside
      document.addEventListener('click', closeAllAcDropdowns, { once: true });
    }

    function closeAllAcDropdowns() {
      document.querySelectorAll('.ac-dropdown').forEach(el => el.style.display = 'none');
    }

    // Filter inbound details by search term — matches sample_id, origin_code, name
    function getAcMatches(term) {
      const q = term.toLowerCase().trim();
      return (PAGE_DATA.inboundDetails || []).filter(d =>
        (d.sample_id          || '').toLowerCase().includes(q) ||
        (d.origin_sample_code || '').toLowerCase().includes(q) ||
        (d.sample_name        || '').toLowerCase().includes(q)
      ).slice(0, 12);
    }

    function onAcInput(idx, value) {
      const drop = document.getElementById('ac-drop-' + idx);
      if (!drop) return;

      // Clear selection if user is typing new search
      if (outboundDetailRows[idx].inbound_detail_id &&
          value !== (outboundDetailRows[idx].sample_code || '')) {
        outboundDetailRows[idx].inbound_detail_id = '';
        outboundDetailRows[idx].sample_code = '';
        outboundDetailRows[idx].sample_name = '';
        outboundDetailRows[idx].origin_sample_code = '';
        const originEl = document.getElementById('ac-origin-' + idx);
        const nameEl   = document.getElementById('ac-name-'   + idx);
        if (originEl) originEl.value = '';
        if (nameEl)   nameEl.value   = '';
      }

      if (!value.trim()) { drop.style.display = 'none'; return; }

      const matches = getAcMatches(value);
      if (!matches.length) {
        drop.innerHTML = '<div class="ac-item" style="color:var(--muted)">No matches</div>';
        const inputEl = document.getElementById('ac-input-' + idx);
        if (inputEl) { const r = inputEl.getBoundingClientRect(); drop.style.top = (r.bottom + window.scrollY) + 'px'; drop.style.left = r.left + 'px'; drop.style.width = r.width + 'px'; }
        drop.style.display = 'block';
        return;
      }

      drop.innerHTML = matches.map((d, mi) => {
        const avail = d.buyer_available !== undefined ? d.buyer_available : (d.available_bags || 0);
        return `<div class="ac-item" data-idx="${mi}" onmousedown="onAcPick(${idx}, '${d.detail_id}')">
          <span class="ac-item-id">${UI.esc(d.sample_id || '')}</span>
          <span class="ac-item-avail">${avail} bags</span>
          <div class="ac-item-sub">${UI.esc(d.origin_sample_code || '—')} · ${UI.esc(d.sample_name || '')}</div>
        </div>`;
      }).join('');
      // v1.11.2: position fixed relative to input — escapes any overflow:hidden parent
      const inputEl = document.getElementById('ac-input-' + idx);
      if (inputEl) {
        const rect = inputEl.getBoundingClientRect();
        drop.style.top   = (rect.bottom + window.scrollY) + 'px';
        drop.style.left  = rect.left + 'px';
        drop.style.width = rect.width + 'px';
      }
      drop.style.display = 'block';
    }

    function onAcKey(e, idx) {
      // Keyboard nav: Escape closes dropdown
      if (e.key === 'Escape') {
        const drop = document.getElementById('ac-drop-' + idx);
        if (drop) drop.style.display = 'none';
      }
    }

    function onAcPick(idx, detailId) {
      const det = (PAGE_DATA.inboundDetails || []).find(d => String(d.detail_id) === String(detailId));
      if (!det) return;

      // Populate row — origin first, then name
      outboundDetailRows[idx].inbound_detail_id  = det.detail_id;
      outboundDetailRows[idx].sample_code        = det.sample_id;
      outboundDetailRows[idx].sample_name        = det.sample_name;
      outboundDetailRows[idx].origin_sample_code = det.origin_sample_code;

      // Update inputs inline without full re-render
      const inputEl  = document.getElementById('ac-input-'  + idx);
      const originEl = document.getElementById('ac-origin-' + idx);
      const nameEl   = document.getElementById('ac-name-'   + idx);
      const dropEl   = document.getElementById('ac-drop-'   + idx);

      if (inputEl)  inputEl.value  = det.sample_id || '';
      if (originEl) originEl.value = det.origin_sample_code || '';
      if (nameEl)   nameEl.value   = det.sample_name || '';
      if (dropEl)   dropEl.style.display = 'none';
    }

    function removeOutboundDetailRow(i) {
      if (outboundDetailRows.length === 1) { UI.toastError('At least one sample row required.'); return; }
      outboundDetailRows.splice(i, 1);
      renderOutboundDetailRows();
    }


    document.getElementById('btn-add-detail-row').addEventListener('click', () => {
      outboundDetailRows.push({ inbound_detail_id: '', sample_code: '', sample_name: '', origin_sample_code: '', sample_type: '', qty_grams: '' });  // v1.7
      renderOutboundDetailRows();
    });

    // ── Save Outbound ─────────────────────────────────────────────────────────
    document.getElementById('btn-save-outbound').addEventListener('click', async () => {
      const buyerId     = document.getElementById('o-buyer').value;
      const warehouseId = document.getElementById('o-warehouse').value;
      const beans       = document.getElementById('o-beans').value;

      if (!buyerId)     { UI.toastError('Select a buyer.'); return; }
      if (!warehouseId) { UI.toastError('Select a warehouse.'); return; }
      if (!beans)       { UI.toastError('Select beans type.'); return; }

      const validDetails = outboundDetailRows.filter(d => d.inbound_detail_id);  // v1.7: must pick from picker
      if (!validDetails.length) { UI.toastError('Select at least one sample from the picker.'); return; }

      const btn = document.getElementById('btn-save-outbound');
      UI.setLoading(btn, true);

      try {
        const outboundData = {
          buyer_id:        buyerId,
          warehouse_id:    warehouseId,
          beans:           beans,
          shipping_date:   document.getElementById('o-shipping-date').value,
          courier:         document.getElementById('o-courier').value.trim(),
          tracking_number: document.getElementById('o-tracking').value.trim(),
          notes:           document.getElementById('o-notes').value.trim().substring(0, 250),  // v1.12
          status:          'Requested'
        };

        // Single call — passes details in payload so GAS can email warehouse with full info
        const { outbound_id } = await API.saveOutbound(outboundData, validDetails);

        // Save details (separate calls — detail IDs needed individually)
        for (const d of validDetails) {
          await API.saveOutboundDetail(outbound_id, d);
        }

        UI.closeModal('modal-outbound');
        UI.toastSuccess('Outbound created. Warehouse notified.');
        await loadPageData(document.getElementById('filter-warehouse').value || null);
      } catch (err) {
        UI.toastError(err.message);
      } finally {
        UI.setLoading(btn, false);
      }
    });

    // ── Status Update ─────────────────────────────────────────────────────────
    function openStatusConfirm(outboundId, status, buyerName) {
      pendingStatus = { outbound_id: outboundId, status };

      // Notify message per status
      const notifyMsg = status === 'Sent'
        ? 'Buyer <strong>' + UI.esc(buyerName) + '</strong> will receive an email with sample details and reservation links.'
        : status === 'Dropped Off' || status === 'Received'
          ? 'Buyer <strong>' + UI.esc(buyerName) + '</strong> and the warehouse will be notified.'
          : 'No emails will be sent.';

      document.getElementById('status-confirm-info').innerHTML =
        'Change status of outbound <strong>#' + UI.esc(outboundId) + '</strong> to ' +
        '<strong style="font-size:1rem">' + UI.esc(status) + '</strong><br><br>' +
        notifyMsg;

      // v1.11.3: Show shipping fields only when transitioning to Sent
      const shippingDiv = document.getElementById('shipping-fields');
      const isSent = status === 'Sent';
      shippingDiv.style.display = isSent ? 'block' : 'none';
      if (isSent) {
        document.getElementById('st-shipping-date').value = '';
        document.getElementById('st-courier').value       = '';
        document.getElementById('st-tracking').value      = '';
      }

      UI.openModal('modal-status');
    }

    document.getElementById('btn-confirm-status').addEventListener('click', async () => {
      const btn = document.getElementById('btn-confirm-status');

      // v1.11.3: validate + collect shipping fields when transitioning to Sent
      let extraParams = {};
      if (pendingStatus.status === 'Sent') {
        const shippingDate    = document.getElementById('st-shipping-date').value;
        const courier         = document.getElementById('st-courier').value.trim();
        const trackingNumber  = document.getElementById('st-tracking').value.trim();
        if (!shippingDate)   { UI.toastError('Shipping date is required.'); return; }
        if (!courier)        { UI.toastError('Courier is required.'); return; }
        if (!trackingNumber) { UI.toastError('Tracking number is required.'); return; }
        extraParams = { shipping_date: shippingDate, courier, tracking_number: trackingNumber };
      }

      UI.setLoading(btn, true);
      try {
        await API.updateOutboundStatus(pendingStatus.outbound_id, pendingStatus.status, extraParams);
        UI.closeModal('modal-status');
        UI.toastSuccess('Status updated to ' + pendingStatus.status + '.');
        await loadPageData(document.getElementById('filter-warehouse').value || null);
      } catch (err) {
        UI.toastError(err.message);
      } finally {
        UI.setLoading(btn, false);
      }
    });
  </script>

</body>
</html>
